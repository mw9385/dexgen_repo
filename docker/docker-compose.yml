# ==============================================================================
# DexGen docker-compose
# ==============================================================================
# Usage:
#   docker compose -f docker/docker-compose.yml build
#   docker compose -f docker/docker-compose.yml up -d
#   docker compose -f docker/docker-compose.yml exec dexgen bash
#   docker compose -f docker/docker-compose.yml down
#
# Or use the helper script:
#   ./docker/run.sh build
#   ./docker/run.sh up
#   ./docker/run.sh exec bash
#   ./docker/run.sh train_rl --num_envs 512 --headless
# ==============================================================================

services:
  dexgen:
    build:
      context: ..                     # repo root
      dockerfile: docker/Dockerfile
      network: host
      args:
        ISAACSIM_VERSION: "5.1.0"
        ISAACLAB_VERSION: "v2.3.2"    # [수정됨] Isaac Sim 5.1.0과 호환되는 Isaac Lab 버전
    image: dexgen:latest
    container_name: dexgen
    entrypoint: ["/bin/bash", "-lc"]
    command: ["sleep infinity"]

    # --------------------------------------------------------------------------
    # GPU access (requires nvidia-container-toolkit on host)
    # --------------------------------------------------------------------------
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # --------------------------------------------------------------------------
    # Shared memory (needed by Isaac Sim for large parallel envs)
    # --------------------------------------------------------------------------
    shm_size: "16gb"
    ulimits:
      memlock: -1
      stack: 67108864

    # --------------------------------------------------------------------------
    # Environment variables
    # --------------------------------------------------------------------------
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      # Set DISPLAY for GUI rendering (e.g. DISPLAY=:1 for virtual framebuffer)
      # Leave empty for headless training
      - DISPLAY=${DISPLAY:-}
      # Forward X11 authorization so non-headless Isaac Sim can open a window.
      - XAUTHORITY=${XAUTHORITY:-/run/user/1000/gdm/Xauthority}
      # Isaac Sim accepts EGL for headless GPU rendering
      - OMNI_KIT_ALLOW_ROOT=1
      - ACCEPT_EULA=Y                 # accept NVIDIA Isaac Sim EULA

    # --------------------------------------------------------------------------
    # Volumes: mount host code & data for live editing without rebuild
    # --------------------------------------------------------------------------
    volumes:
      - ..:/workspace/dexgen                   # live source mount (data/ and logs/ included)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw       # X11 GUI (optional)
      - ${XAUTHORITY:-/run/user/1000/gdm/Xauthority}:${XAUTHORITY:-/run/user/1000/gdm/Xauthority}:ro

    # --------------------------------------------------------------------------
    # Network
    # --------------------------------------------------------------------------
    network_mode: host                          # simplest for Isaac Sim UDP

    # --------------------------------------------------------------------------
    # Keep container alive for exec commands
    # --------------------------------------------------------------------------
    stdin_open: true
    tty: true

    working_dir: /workspace/dexgen

# Named volumes removed: ..:/workspace/dexgen bind mount already covers
# data/ and logs/ on the host filesystem directly.
