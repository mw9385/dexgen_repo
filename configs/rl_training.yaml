# ==============================================================================
# Stage 1 – RL Training Configuration (DeXtreme-aligned)
# ==============================================================================
# Task:      AnyGrasp-to-AnyGrasp (DexterityGen §3.2)
# Algorithm: Symmetric Actor-Critic PPO via rl_games
# Reward:    DeXtreme (Handa et al., ICRA 2023)
# ==============================================================================

env:
  task: DexGen-AnyGrasp-Sharpa-v0
  num_envs: 512
  episode_length_s: 8.0          # DeXtreme resetTime
  action_scale: 1.0              # [-1,1] maps to full joint range
  action_mode: "absolute"        # policy outputs target joint positions directly
  actions_moving_average: 0.3    # fixed EMA smoothing (no annealing)
  actions_moving_average_schedule:
    lower: 0.3
    upper: 0.3
    schedule_steps: 0            # 0 = no annealing, fixed at 0.3
  decimation: 8                  # 30 Hz control (240 Hz sim / 8), DeXtreme-aligned
  training_curriculum:
    enabled: true
    # Time-based linear ramp over warmup_ratio × total_epochs
    warmup_ratio: 0.10            # reach end values at 10% of training (5000/50000)
    start_gravity: 1.0
    end_gravity: 9.81
    min_orn_start: 0.80           # rad (~45.8°)
    min_orn_end: 3.14             # rad (~180°)

  rewards:
    # Delta-form primary rewards: do-nothing → 0, only progress earns reward
    # r_t = w_rot × Δrot_err + w_pos × Δpos_err + w_finger × Δfinger_err
    #     + reg + style + goal_bonus
    #
    # r_goal (delta):
    rotation_weight: 500.0             # Δrot_err × weight  PRIMARY
    distance_weight: 100.0             # Δpos_err × weight  auxiliary
    finger_match_weight: 50.0          # Δfinger_err × weight
    goal_bonus: 250.0                  # +250 sparse when reached
    goal_thresh: 0.4                   # rad
    pos_thresh: 0.05                   # m
    # r_style:
    fingertip_velocity_weight: -0.001
    # r_reg:
    action_penalty_weight: -0.0001     # Σ(a²) — raw policy output (pre-EMA)
    action_delta_penalty_weight: -0.01 # Σ(Δa²)
    velocity_penalty_weight: -0.05     # Σ((v/4)²)
    torque_penalty_weight: -0.0001     # Σ(τ²)
    work_penalty_weight: -0.001        # Σ |τ × ω|

  terminations:
    object_drop_max_dist: 0.24         # m — DeXtreme fall_dist = 0.24
    # Episode ends on drop; no reward penalty (opportunity cost of +250 is signal).

# ==============================================================================
# Symmetric Actor-Critic PPO (rl_games)
# ==============================================================================
#
#   Sharpa Hand (22 DOF, 5 fingers; no wrist):
#   Actor = Critic: MLP [512, 512]  input: 309-dim obs (symmetric)
#     temporal(258) = 3 frames × [joint_pos(22) + joint_vel(22)
#                                 + joint_targets(22) + contacts(5)
#                                 + contact_pos(15)]
#     + last_action(22) + obj_pose(7) + obj_vel(6)
#     + target_pos(3) + target_quat(4) + goal_rel_rot(4)
#     + rot_dist(2) + dr_params(3)
#
#   rl_games reads env observations["policy"] for actor and
#   env observations["critic"] for critic (both 309-dim, symmetric).
# ==============================================================================

ppo:
  units: [512, 512]
  activation: elu
  fixed_sigma: true
  sigma_init: -1.0

  use_rnn: false
  rnn:
    name: lstm
    units: 256
    layers: 1
    before_mlp: false
    concat_input: true

  learning_rate: 1.0e-4          # DeXtreme-aligned
  lr_schedule: adaptive
  lr_threshold: 0.008
  gamma: 0.998                   # DeXtreme (longer horizon for sparse +250 bonus)
  tau: 0.95
  e_clip: 0.2
  entropy_coef: 0.0
  bounds_loss_coef: 0.005        # actively pull mu back into [-1,1]
  critic_coef: 4.0
  grad_norm: 1.0
  normalize_input: true
  normalize_value: true
  normalize_advantage: true

  reward_shaper_scale: 1.0

  horizon_length: 16
  seq_length: 8
  num_steps_per_env: 16
  mini_epochs: 4                 # DeXtreme-aligned
  minibatch_size: 16384          # DeXtreme-aligned (batch=num_envs×16; at num_envs=4096 → 4 minibatches)

  max_iterations: 50000          # DeXtreme-aligned

central_value:
  units: [512, 512]
  activation: elu
  learning_rate: 5.0e-4
  lr_schedule: adaptive
  lr_threshold: 0.008
  clip_value: true
  normalize_input: true
  grad_norm: 1.0
  mini_epochs: 4
  minibatch_size: 8192

logging:
  log_dir: logs/rl/sharpa_anygrasp_v1
  save_frequency: 1000
  print_stats: true

domain_randomization:
  object_physics:
    mass_range:        [0.03, 0.30]     # DeXtreme-aligned (wider range)
    friction_range:    [0.30, 1.20]     # DeXtreme-aligned
    restitution_range: [0.00, 0.40]     # DeXtreme-aligned
  robot_physics:
    damping_range:     [0.01, 0.30]     # DeXtreme-aligned (wider range)
    armature_range:    [0.001, 0.03]    # DeXtreme-aligned
  action_delay:
    max_delay: 2                        # DeXtreme uses higher delay
  obs_noise:
    joint_pos_std:     0.005
    joint_vel_std:     0.04
