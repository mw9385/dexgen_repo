# ==============================================================================
# Stage 1 – RL Training Configuration
# ==============================================================================
# Task:      AnyGrasp-to-AnyGrasp (DexterityGen §3.2)
# Algorithm: Asymmetric Actor-Critic PPO via rl_games
# ==============================================================================

env:
  task: DexGen-AnyGrasp-Allegro-v0
  num_envs: 512
  episode_length_s: 10.0
  action_scale: 0.1              # joint position delta scale (rad)
  decimation: 4                  # control at 30 Hz (120 Hz sim / 4)

  rewards:
    fingertip_tracking:  10.0    # dense exp(-20*dist) per fingertip
    grasp_success:       50.0    # sparse bonus: all tips within 1 cm
    fingertip_contact:    2.0    # maintain contact during transition
    action_rate:         -0.01   # jerk penalty
    object_velocity:     -0.5    # penalise spinning/flinging object
    object_drop:       -200.0    # drop penalty (also terminates episode)
    joint_limit:         -0.1    # soft limit penalty
    wrist_height:        -1.0    # prevent wrist-table collision

# ==============================================================================
# Asymmetric Actor-Critic PPO (rl_games)
# ==============================================================================
#
#   Actor  network: MLP [512, 512, 256, 128]  input: 76-dim policy obs
#   Critic network: MLP [512, 512, 256]       input: 104-dim privileged obs
#
#   The central_value_config block enables the separate critic network.
#   rl_games reads env observations["policy"] for actor and
#   env observations["critic"] for the central value function.
# ==============================================================================

ppo:
  # Actor network
  units: [512, 512, 256, 128]
  activation: elu
  fixed_sigma: true
  sigma_init: 0.0

  # Core PPO hyperparameters
  learning_rate: 5.0e-4
  lr_schedule: adaptive
  gamma: 0.99
  tau: 0.95                      # GAE lambda
  e_clip: 0.2
  entropy_coef: 0.0
  critic_coef: 4.0
  grad_norm: 1.0
  normalize_input: true
  normalize_value: true
  normalize_advantage: true

  # Rollout
  num_steps_per_env: 8
  mini_epochs: 5
  minibatch_size: 16384

  # Training length
  max_iterations: 30000

# ==============================================================================
# Central Value Function (separate critic for asymmetric AC)
# ==============================================================================
# Uses privileged 104-dim observations from env observations["critic"].
# Larger network than actor since it processes more information.
# ==============================================================================

central_value:
  # Critic network
  units: [512, 512, 256]
  activation: elu

  # Critic-specific PPO params
  learning_rate: 5.0e-4
  kl_threshold: 0.016
  clip_value: true
  normalize_input: true
  grad_norm: 1.0
  mini_epochs: 4
  minibatch_size: 16384

logging:
  log_dir: logs/rl/allegro_anygrasp
  save_frequency: 1000
  print_stats: true
