# ==============================================================================
# Stage 1 – RL Training Configuration
# ==============================================================================
# Task:      AnyGrasp-to-AnyGrasp (DexterityGen §3.2)
# Algorithm: Symmetric Actor-Critic PPO via rl_games
# ==============================================================================

env:
  task: DexGen-AnyGrasp-Sharpa-v0
  num_envs: 512
  episode_length_s: 10.0
  action_scale: 1.0              # [-1,1] maps to full joint range
  action_mode: "absolute"        # policy outputs target joint positions directly (OpenAI Dactyl style)
  actions_moving_average: 1.0    # 1.0 = no smoothing (add EMA later for sim-to-real)
  decimation: 12                 # control at 20 Hz (240 Hz sim / 12), matching Sharpa default
  training_curriculum:
    enabled: true
    # Performance-gated: only advances when drop_ratio < threshold
    advance_drop_thresh: 0.3      # advance curriculum when <30% drops
    # Gravity: incremental steps when performing well
    start_gravity: 4.5
    end_gravity: 9.81
    gravity_step: 0.1             # +0.1 m/s² per advance
    # Goal difficulty: min orientation distance for kNN goal selection
    min_orn_start: 0.80           # rad (~45.8°)
    min_orn_end: 3.14             # rad (~180°)
    orn_step: 0.05                # +0.05 rad per advance

  rewards:
    # OpenAI "Learning Dexterous In-Hand Manipulation" (2018)
    # r_t = (d_t - d_{t+1}) + goal_bonus + drop_penalty
    orientation_delta_weight: 100.0    # ~0.4/step, ~80 per episode
    goal_bonus: 5.0                    # +5 when rot_dist < goal_thresh
    goal_thresh: 0.4                   # rad (~23°)
    drop_penalty: -20.0                # when object_dropped (too far from palm; matches termination)

  terminations:
    object_drop_max_dist: 0.25         # m — palm centre to object; failure if exceeded
    # NOTE: object sits ~17cm from palm body in hand frame (grasp data),
    # so threshold must be larger than that baseline distance.

# ==============================================================================
# Symmetric Actor-Critic PPO (rl_games)
# ==============================================================================
#
#   Sharpa Hand (22 DOF, 5 fingers; no wrist):
#   Actor = Critic: MLP [512, 512]  input: 199-dim obs (symmetric)
#     temporal(192) = 3 frames × [joint_pos(22) + joint_targets(22)
#                                 + contacts(5) + contact_pos(15)]
#     + target_obj_pos(3) + target_obj_quat(4)
#
#   rl_games reads env observations["policy"] for actor and
#   env observations["critic"] for critic (both 199-dim, symmetric).
# ==============================================================================

ppo:
  units: [512, 512]
  activation: elu
  fixed_sigma: true
  sigma_init: -1.0

  use_rnn: false
  rnn:
    name: lstm
    units: 256
    layers: 1
    before_mlp: false
    concat_input: true

  learning_rate: 5.0e-4
  lr_schedule: adaptive
  lr_threshold: 0.008
  gamma: 0.99
  tau: 0.95
  e_clip: 0.2
  entropy_coef: 0.0
  bounds_loss_coef: 0.0001
  critic_coef: 4.0
  grad_norm: 1.0
  normalize_input: true
  normalize_value: true
  normalize_advantage: true

  reward_shaper_scale: 1.0

  horizon_length: 16
  seq_length: 8
  num_steps_per_env: 16
  mini_epochs: 8
  minibatch_size: 4096

  max_iterations: 10000

central_value:
  units: [512, 512]
  activation: elu
  learning_rate: 5.0e-4
  lr_schedule: adaptive
  lr_threshold: 0.008
  clip_value: true
  normalize_input: true
  grad_norm: 1.0
  mini_epochs: 4
  minibatch_size: 8192

logging:
  log_dir: logs/rl/sharpa_anygrasp_v1
  save_frequency: 1000
  print_stats: true

domain_randomization:
  object_physics:
    mass_range:        [0.05, 0.10]
    friction_range:    [0.80, 1.20]
    restitution_range: [0.00, 0.20]
  robot_physics:
    damping_range:     [0.01, 0.10]
    armature_range:    [0.001, 0.01]
  action_delay:
    max_delay: 1
  obs_noise:
    joint_pos_std:     0.005
    joint_vel_std:     0.04
