# ==============================================================================
# Stage 1 – RL Training Configuration
# ==============================================================================
# Task:      AnyGrasp-to-AnyGrasp (DexterityGen §3.2)
# Algorithm: Asymmetric Actor-Critic PPO via rl_games
# ==============================================================================

env:
  task: DexGen-AnyGrasp-Shadow-v0
  num_envs: 512
  episode_length_s: 10.0
  action_scale: 1.0              # normalized [-1, 1] action mapped to full soft joint range
  decimation: 4                  # control at 30 Hz (120 Hz sim / 4)

  rewards:
    # Goal rewards
    object_pose:        8.0     # exp(-10*d_pos) + exp(-5*d_rot) in wrist frame [0,2]
    finger_joint_goal:  8.0     # exp(-3*||Δq_norm||) joint-space goal [0,1]
    fingertip_tracking: 10.0    # exp(-10*dist) per fingertip, mean [0,1]  (alpha 20→10 wider gradient)
    grasp_success:      50.0    # sparse bonus: all tips within 1 cm
    # Contact / style
    fingertip_contact:   2.0    # fraction of tips in contact [0,1]
    fingertip_velocity: -0.1    # mean(||v_tip||^2) over fingers (style penalty)
    # Regularization
    action_scale:       -0.001  # ||a||^2 action magnitude
    torque:             -0.05   # mean(tau_i^2) — normalized by DOF count
    mechanical_work:    -0.02   # mean(|tau_i * qdot_i|) — normalized by DOF count
    action_rate:        -0.01   # jerk penalty ||a_t - a_{t-1}||
    # Safety
    object_velocity:    -0.5    # penalise spinning/flinging object
    object_drop:       -200.0   # drop penalty (also terminates episode)
    object_left_hand:  -100.0   # escape penalty (all directions)
    joint_limit:        -0.1    # soft limit penalty
    # wrist_height removed: nearly never fires (hand at z=0.6, threshold 0.1);
    # wrist escape handled by early-termination added in events.py

# ==============================================================================
# Asymmetric Actor-Critic PPO (rl_games)
# ==============================================================================
#
#   Shadow Hand (24 DOF, 5 fingers):
#   Actor  network: MLP [1024, 512, 512, 256, 256]  input: 107-dim policy obs
#     joint_pos(24) + joint_vel(24) + fingertip_pos(15) + target_fps(15)
#     + contact_binary(5) + last_action(24)
#   Critic network: MLP [1024, 512, 512, 256, 256]  input: 138-dim privileged obs
#     [actor 107] + obj_pose(7) + obj_vel(6) + contact_forces(15) + dr_params(3)
#
#   The central_value_config block enables the separate critic network.
#   rl_games reads env observations["policy"] for actor and
#   env observations["critic"] for the central value function.
# ==============================================================================

ppo:
  # Actor network — matches paper (arXiv:2502.04307) architecture.
  # Paper uses [1024, 512, 512, 256, 256] for both actor and critic.
  # Shadow Hand (24 DOF, 5 fingers) benefits from the larger capacity.
  units: [1024, 512, 512, 256, 256]
  activation: elu
  fixed_sigma: true
  sigma_init: -1.0

  # Core PPO hyperparameters
  learning_rate: 5.0e-4
  lr_schedule: adaptive
  lr_threshold: 0.008
  gamma: 0.99
  tau: 0.95                      # GAE lambda
  e_clip: 0.2
  entropy_coef: 0.0
  critic_coef: 4.0
  grad_norm: 1.0
  # [FIX] normalize_input/value: true — critical for stable learning
  normalize_input: true
  normalize_value: true
  normalize_advantage: true

  # [FIX] reward_shaper: 0.1 (was 0.01 → reward was scaled down 100x)
  reward_shaper_scale: 0.1

  # Rollout
  # [FIX] horizon_length: 32 — longer PPO rollout for reset-heavy envs
  horizon_length: 32
  num_steps_per_env: 32
  mini_epochs: 5
  # Total rollout = num_envs(512) × horizon(16) = 8192 samples.
  # minibatch_size MUST be ≤ rollout total.  4096 → 2 minibatches/epoch.
  # Paper batch_size=8192 matches our rollout; minibatch is a subdivision.
  minibatch_size: 4096

  # Training length
  max_iterations: 30000

# ==============================================================================
# Central Value Function (separate critic for asymmetric AC)
# ==============================================================================
# Uses privileged 104-dim observations from env observations["critic"].
# Larger network than actor since it processes more information.
# ==============================================================================

central_value:
  # Critic network — same size as actor per paper.
  units: [1024, 512, 512, 256, 256]
  activation: elu

  # Critic-specific PPO params
  learning_rate: 5.0e-4
  lr_schedule: adaptive
  lr_threshold: 0.008
  clip_value: true
  # [FIX] normalize_input: true for critic as well
  normalize_input: true
  grad_norm: 1.0
  mini_epochs: 4
  minibatch_size: 4096

logging:
  log_dir: logs/rl/shadow_anygrasp_v1
  save_frequency: 1000
  print_stats: true

# ==============================================================================
# Domain Randomization
# ==============================================================================
# Values are injected into AnyGraspEventsCfg at training startup.
# Edit these ranges to change what gets randomised each episode reset.
#
#  object_physics:
#    mass_range        [kg]   object inertia (heavier → harder to fling)
#    friction_range    [-]    lateral contact friction
#    restitution_range [-]    bounciness (0 = no bounce)
#
#  robot_physics:
#    damping_range     [N·m·s/rad]  per-joint velocity damping
#    armature_range    [kg·m²]      per-joint effective inertia
#
#  action_delay:
#    max_delay         [steps]  max sim-step lag injected into action stream
#
#  obs_noise:
#    joint_pos_std     [rad]    Gaussian noise on joint position encoder
#    joint_vel_std     [rad/s]  Gaussian noise on joint velocity (pre-normalise)
#    fingertip_pos_std [m]      Gaussian noise on fingertip FK position
# ==============================================================================

domain_randomization:

  object_physics:
    mass_range:        [0.03, 0.30]   # kg
    friction_range:    [0.30, 1.20]
    restitution_range: [0.00, 0.40]

  robot_physics:
    damping_range:     [0.01, 0.30]   # N·m·s/rad
    armature_range:    [0.001, 0.03]  # kg·m²

  action_delay:
    max_delay: 2                       # steps  (0 = no delay)

  obs_noise:
    joint_pos_std:     0.005           # rad
    joint_vel_std:     0.04            # in normalised space (≈ 0.2 rad/s)
    fingertip_pos_std: 0.003           # m
