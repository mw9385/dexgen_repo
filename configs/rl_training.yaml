# ==============================================================================
# Stage 1 – RL Training Configuration
# ==============================================================================
# Task:      AnyGrasp-to-AnyGrasp (DexterityGen §3.2)
# Algorithm: Asymmetric Actor-Critic PPO via rl_games
# ==============================================================================

env:
  task: DexGen-AnyGrasp-Shadow-v0
  num_envs: 512
  episode_length_s: 10.0
  action_scale: 1.0              # normalized [-1, 1] action mapped to full soft joint range
  decimation: 4                  # control at 30 Hz (120 Hz sim / 4)

  rewards:
    # DexterityGen reward structure (arXiv:2502.04307 §3.2):
    #   r = r_goal + r_style + r_reg
    # All functions output [-1, 1]. Drop/escape → termination (no penalty).
    #
    # r_goal (func → [0, 1])
    fingertip_tracking: 1.0     # exp(-5 * tip_dist) in object frame
    # r_style (func → [-1, 0])
    fingertip_velocity: 0.05
    # r_reg (func → [-1, 0]) — minimal, just smoothing
    action_scale:       0.0001
    torque:             0.0001
    mechanical_work:    0.0001

# ==============================================================================
# Asymmetric Actor-Critic PPO (rl_games)
# ==============================================================================
#
#   Shadow Hand (22 finger DOF, 5 fingers; wrist excluded from policy):
#   Actor  network: MLP [1024, 512, 512, 256, 256]  input: 101-dim policy obs
#     joint_pos(22) + joint_vel(22) + fingertip_pos(15) + target_fps(15)
#     + contact_binary(5) + last_action(22)
#   Critic network: MLP [1024, 512, 512, 256, 256]  input: 132-dim privileged obs
#     [actor 101] + obj_pose(7) + obj_vel(6) + contact_forces(15) + dr_params(3)
#
#   The central_value_config block enables the separate critic network.
#   rl_games reads env observations["policy"] for actor and
#   env observations["critic"] for the central value function.
# ==============================================================================

ppo:
  # Actor network — matches paper (arXiv:2502.04307) architecture.
  # Paper uses [1024, 512, 512, 256, 256] for both actor and critic.
  # Shadow Hand (24 DOF, 5 fingers) benefits from the larger capacity.
  units: [1024, 512, 512, 256, 256]
  activation: elu
  fixed_sigma: true
  sigma_init: -1.0

  # RNN (LSTM) — set use_rnn: true to enable.
  # MLP acts as feature extractor, then LSTM processes the sequence.
  # seq_length controls BPTT length; horizon_length must be divisible by it.
  use_rnn: false
  rnn:
    name: lstm
    units: 256
    layers: 1
    before_mlp: false       # MLP → LSTM → mu
    concat_input: true      # concat raw input with MLP output for LSTM input

  # Core PPO hyperparameters
  learning_rate: 5.0e-4
  lr_schedule: adaptive
  lr_threshold: 0.008
  gamma: 0.99
  tau: 0.95                      # GAE lambda
  e_clip: 0.2
  # entropy_coef=0.0: standard for dexterous manipulation (IsaacGymEnvs ShadowHand).
  # Nonzero values can cause entropy to rise continuously when reward signal is weak.
  entropy_coef: 0.0
  # bounds_loss_coef=0.0001: standard IsaacGymEnvs value.
  bounds_loss_coef: 0.0001
  critic_coef: 4.0
  grad_norm: 1.0
  # [FIX] normalize_input/value: true — critical for stable learning
  normalize_input: true
  normalize_value: true
  normalize_advantage: true

  # Slightly stronger reward scale so dense goal rewards are not drowned out early.
  reward_shaper_scale: 0.2

  # Rollout
  # Paper (arXiv:2502.04307) batch_size=8192: num_envs(512) × horizon(16) = 8192.
  horizon_length: 16
  seq_length: 8              # BPTT length for LSTM (ignored for MLP)
  num_steps_per_env: 16
  mini_epochs: 5
  # minibatch_size=4096 → 2 minibatches/epoch.
  minibatch_size: 4096

  # Training length
  max_iterations: 30000

# ==============================================================================
# Central Value Function (separate critic for asymmetric AC)
# ==============================================================================
# Uses privileged 104-dim observations from env observations["critic"].
# Larger network than actor since it processes more information.
# ==============================================================================

central_value:
  # Critic network — same size as actor per paper.
  units: [1024, 512, 512, 256, 256]
  activation: elu

  # Critic-specific PPO params
  learning_rate: 5.0e-4
  lr_schedule: adaptive
  lr_threshold: 0.008
  clip_value: true
  # [FIX] normalize_input: true for critic as well
  normalize_input: true
  grad_norm: 1.0
  mini_epochs: 4
  minibatch_size: 4096

logging:
  log_dir: logs/rl/shadow_anygrasp_v1
  save_frequency: 1000
  print_stats: true

# ==============================================================================
# Domain Randomization
# ==============================================================================
# Values are injected into AnyGraspEventsCfg at training startup.
# Edit these ranges to change what gets randomised each episode reset.
#
#  object_physics:
#    mass_range        [kg]   object inertia (heavier → harder to fling)
#    friction_range    [-]    lateral contact friction
#    restitution_range [-]    bounciness (0 = no bounce)
#
#  robot_physics:
#    damping_range     [N·m·s/rad]  per-joint velocity damping
#    armature_range    [kg·m²]      per-joint effective inertia
#
#  action_delay:
#    max_delay         [steps]  max sim-step lag injected into action stream
#
#  obs_noise:
#    joint_pos_std     [rad]    Gaussian noise on joint position encoder
#    joint_vel_std     [rad/s]  Gaussian noise on joint velocity (pre-normalise)
#    fingertip_pos_std [m]      Gaussian noise on fingertip FK position
# ==============================================================================

domain_randomization:

  object_physics:
    mass_range:        [0.05, 0.15]   # kg  (narrowed from [0.03, 0.30])
    friction_range:    [0.50, 1.00]   # -   (narrowed from [0.30, 1.20])
    restitution_range: [0.00, 0.20]   # -   (narrowed from [0.00, 0.40])

  robot_physics:
    damping_range:     [0.01, 0.10]   # N·m·s/rad  (narrowed from [0.01, 0.30])
    armature_range:    [0.001, 0.01]  # kg·m²      (narrowed from [0.001, 0.03])

  action_delay:
    max_delay: 1                       # steps  (reduced from 2; 0 = no delay)

  obs_noise:
    joint_pos_std:     0.005           # rad
    joint_vel_std:     0.04            # in normalised space (≈ 0.2 rad/s)
    fingertip_pos_std: 0.003           # m
