# ==============================================================================
# Stage 1 – RL Training Configuration
# ==============================================================================
# Task:      AnyGrasp-to-AnyGrasp (DexterityGen §3.2)
# Algorithm: Symmetric Actor-Critic PPO via rl_games
# ==============================================================================

env:
  task: DexGen-AnyGrasp-Sharpa-v0
  num_envs: 512
  episode_length_s: 10.0
  action_scale: 1.0              # [-1,1] maps to full joint range
  action_mode: "absolute"        # policy outputs target joint positions directly (OpenAI Dactyl style)
  actions_moving_average: 1.0    # 1.0 = no smoothing (add EMA later for sim-to-real)
  decimation: 12                 # control at 20 Hz (240 Hz sim / 12), matching Sharpa default
  training_curriculum:
    enabled: true
    warmup_ratio: 0.10            # fraction of total epochs for ramp-up
    # Gravity: start near-zero, ramp to full
    start_gravity: 0.05
    end_gravity: 9.81
    # Goal difficulty: min orientation distance for kNN goal selection
    min_orn_start: 0.10           # rad (~5.7°) — easy goals at epoch 0
    min_orn_end: 3.14             # rad (~180°) — full rotation at end of warmup

  terminations:
    no_contact_patience: 30          # steps with 0 fingertip contact → reset (30 steps = 1s at 30Hz)

  rewards:
    # OpenAI "Learning Dexterous In-Hand Manipulation" (2018)
    # r_t = (d_t - d_{t+1}) + goal_bonus + drop_penalty
    orientation_delta_weight: 1.0      # weight on r_t = d_t - d_{t+1}
    goal_bonus: 5.0                    # +5 when rot_dist < goal_thresh
    goal_thresh: 0.4                   # rad (~23°)
    drop_penalty: -20.0                # when object falls or leaves hand

# ==============================================================================
# Symmetric Actor-Critic PPO (rl_games)
# ==============================================================================
#
#   Shadow Hand (22 finger DOF, 5 fingers; wrist excluded from policy):
#   Actor = Critic: MLP [1024, 512, 512, 256, 256]  input: 101-dim obs (symmetric)
#     joint_pos(22) + joint_vel(22) + obj_pose(7) + target_obj_pose(7)
#     + obj_vel(6) + contact_forces(15) + last_action(22)
#
#   rl_games reads env observations["policy"] for actor and
#   env observations["critic"] for critic (both 101-dim, symmetric).
# ==============================================================================

ppo:
  units: [1024, 512, 512, 256, 256]
  activation: elu
  fixed_sigma: true
  sigma_init: -1.0

  use_rnn: false
  rnn:
    name: lstm
    units: 256
    layers: 1
    before_mlp: false
    concat_input: true

  learning_rate: 5.0e-4
  lr_schedule: adaptive
  lr_threshold: 0.008
  gamma: 0.99
  tau: 0.95
  e_clip: 0.2
  entropy_coef: 0.0
  bounds_loss_coef: 0.0001
  critic_coef: 4.0
  grad_norm: 1.0
  normalize_input: true
  normalize_value: true
  normalize_advantage: true

  reward_shaper_scale: 1.0

  horizon_length: 16
  seq_length: 8
  num_steps_per_env: 16
  mini_epochs: 8
  minibatch_size: 4096

  max_iterations: 10000

central_value:
  units: [1024, 512, 512, 256, 256]
  activation: elu
  learning_rate: 5.0e-4
  lr_schedule: adaptive
  lr_threshold: 0.008
  clip_value: true
  normalize_input: true
  grad_norm: 1.0
  mini_epochs: 4
  minibatch_size: 8192

logging:
  log_dir: logs/rl/sharpa_anygrasp_v1
  save_frequency: 1000
  print_stats: true

domain_randomization:
  object_physics:
    mass_range:        [0.05, 0.10]
    friction_range:    [0.80, 1.20]
    restitution_range: [0.00, 0.20]
  robot_physics:
    damping_range:     [0.01, 0.10]
    armature_range:    [0.001, 0.01]
  action_delay:
    max_delay: 1
  obs_noise:
    joint_pos_std:     0.005
    joint_vel_std:     0.04
