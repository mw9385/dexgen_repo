# ==============================================================================
# AllegroHand Isaac Lab Configuration
# ==============================================================================
# Isaac Lab task: Isaac-Repose-Cube-Allegro-v0
# RL algorithm: rl_games (PPO)
#
# Reference:
#   IsaacLab/source/isaaclab_tasks/isaaclab_tasks/manager_based/manipulation/inhand/
# ==============================================================================

task:
  name: Isaac-Repose-Cube-Allegro-v0

  # Environment settings
  env:
    num_envs: 512          # Number of parallel envs. Reduce if OOM.
    episode_length: 400    # Max steps per episode

  # Observation space
  # The policy obs includes:
  #   - joint positions (16 DoF)
  #   - joint velocities (16 DoF)
  #   - fingertip positions (4 * 3 = 12)
  #   - object pose (7: pos + quat)
  #   - object velocity (6)
  #   - goal orientation (4: quat)
  #   - actions (16)
  # Total: ~77 dims (exact depends on Isaac Lab version)

  # Action space: 16 joint position targets (Allegro has 16 DoF)
  action_scale: 0.1

# ------------------------------------------------------------------------------
# RL Training (rl_games PPO)
# ------------------------------------------------------------------------------
training:
  algorithm: rl_games_ppo

  ppo:
    learning_rate: 5.0e-4
    gamma: 0.99
    lambda: 0.95          # GAE lambda
    mini_epochs: 5
    minibatch_size: 16384
    horizon_length: 8     # Steps per rollout
    max_agent_steps: 300000000  # Total env steps

  network:
    # MLP policy: 3 hidden layers of 512 units
    units: [512, 512, 512]
    activation: elu
    fixed_sigma: True
    sigma_init: 0.0

  # Normalization
  normalize_input: True
  normalize_value: True

# ------------------------------------------------------------------------------
# Logging
# ------------------------------------------------------------------------------
logging:
  log_dir: logs/rl_games/allegro_hand
  save_frequency: 1000    # Save checkpoint every N iterations
  video_interval: 0       # 0 = disabled

# ------------------------------------------------------------------------------
# Reward shaping
# Isaac Lab AllegroHand rewards (from source):
#   - orientation reward: exp(-||quat_diff||)
#   - reaching reward: penalty for fingertip-object distance
#   - joint vel penalty: penalize high joint velocities
#   - action penalty: penalize large actions
# ------------------------------------------------------------------------------
rewards:
  orientation_scale: 10.0
  reaching_scale: 0.5
  joint_vel_penalty: -0.001
  action_penalty: -0.0001
