# ==============================================================================
# Stage 0 – Grasp Generation Configuration (Multi-Object Pool)
# ==============================================================================

# ==============================================================================
# Hand configuration
# ==============================================================================
# num_fingers    : how many fingertip contact points to use (2 / 3 / 4 / 5)
# num_dof        : total controllable DOF (used by DR and obs dimension)
# dof_per_finger : joints per finger (average; LF=5, TH=5, others=4)
# fingertip_links: Isaac Lab link names used by ContactSensor & FK lookup
#
# Pre-configured hands:
#   shadow   : num_fingers=5, num_dof=22, fingertips=rh_fftip/mftip/rftip/lftip/thtip
#   allegro  : num_fingers=4, num_dof=16, dof_per_finger=4
#   leap     : num_fingers=4, num_dof=16, dof_per_finger=4
# ==============================================================================

hand:
  name: shadow
  num_fingers: 5
  num_dof: 24                    # total USD joints (20 actuated + 4 passive)
  dof_per_finger: 4              # average (LF=5, TH=5, FF/MF/RF=4); wrist not counted
  fingertip_links:
    - robot0_ffdistal   # forefinger
    - robot0_mfdistal   # middle finger
    - robot0_rfdistal   # ring finger
    - robot0_lfdistal   # little finger
    - robot0_thdistal   # thumb

# Object pool — generates grasps for all combinations of shape × size
object_pool:
  shapes: [cube, sphere, cylinder]   # primitive shapes to include
  size_min: 0.05                     # minimum object size (m)  — clearly visible in sim
  size_max: 0.08                     # maximum object size (m)  — power grasp
  num_sizes: 3                       # size steps per shape (total: 3×3 = 9 objects)

  # Override with a directory of mesh files instead of primitives:
  # mesh_dir: assets/objects/

# Grasp sampler (per object)
sampler:
  num_seed_grasps: 300     # seed grasps per object before NFO filtering

# Net Force Optimization (NFO)
nfo:
  mu: 0.5                  # friction coefficient
  num_friction_edges: 8    # friction cone linearisation edges
  min_quality: 0.005       # minimum NFO ε-metric score
  fast_mode: false         # true = SVD approximation (faster, less accurate)

# Grasp generation method:
#   'optimization'      : DexGraspNet-style differentiable optimization (recommended)
#   'surface_sampling'  : legacy surface sampling + NFO filtering
method: optimization

# ==============================================================================
# Optimization-based grasp generation (DexGraspNet-style)
# ==============================================================================
# Gradient-based optimization of hand pose + joint angles on the object SDF.
# Produces grasps with physically consistent joint angles and guaranteed
# surface contact, unlike RRT which perturbs in free space.
optimization:
  num_iterations: 200       # gradient descent steps per batch
  batch_size: 256           # parallel grasp candidates per batch
  lr: 0.005                 # Adam learning rate
  sdf_resolution: 64        # SDF voxel grid resolution (higher = more accurate)

  # Energy weights (DexGraspNet-style composite energy)
  w_contact: 100.0          # fingertips must be ON the object surface
  w_penetration: 50.0       # no hand-object interpenetration
  w_fc: 10.0                # force closure quality (grasp stability)
  w_self: 20.0              # no finger self-collision
  w_joint: 5.0              # stay within joint limits

# RRT expansion (legacy, used when method=surface_sampling)
rrt:
  target_size: 300           # target grasps per object after expansion

# Output
output_dir: data
