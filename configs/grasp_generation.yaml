# ==============================================================================
# Stage 0 – Grasp Generation Configuration
# ==============================================================================

# ==============================================================================
# Hand configuration
# ==============================================================================
hand:
  name: shadow
  num_fingers: 5                    # N_pts: 3, 4, or 5 contact points per grasp
  num_dof: 24                    # total USD joints (22 actuated + 2 wrist)
  dof_per_finger: 4
  fingertip_links:
    - robot0_ffdistal   # forefinger
    - robot0_mfdistal   # middle finger
    - robot0_rfdistal   # ring finger
    - robot0_lfdistal   # little finger
    - robot0_thdistal   # thumb

# Object pool — generates grasps for all combinations of shape × size
object_pool:
  shapes: [cube, sphere, cylinder]
  size_min: 0.05                     # minimum object size (m)
  size_max: 0.08                     # maximum object size (m)
  num_sizes: 3                       # size steps per shape (total: 3×3 = 9 objects)

# Grasp sampler (legacy, used when method=surface_sampling)
sampler:
  num_seed_grasps: 300

# NFO quality scoring (used as post-filter after optimization)
nfo:
  mu: 0.5                  # friction coefficient
  num_friction_edges: 8
  min_quality: 0.03        # LP force-closure quality (was 0.005, too lax)
  fast_mode: false         # use LP ε-metric, not SVD approximation

# Grasp generation method:
#   'sim_heuristic'     : Isaac Sim physics-based sampling (recommended, no FK mismatch)
#   'optimization'      : DexGraspNet Simulated Annealing (MJCF FK, may cause penetration)
#   'surface_sampling'  : legacy heuristic sampling + NFO
method: sim_heuristic

# ==============================================================================
# DexGraspNet Simulated Annealing Optimization
# ==============================================================================
#
# Algorithm:
#   1. Initialize random hand poses around object (convex hull approach)
#   2. Optimize hand_pose = [translation(3) | rotation_6d(6) | joints(22)]
#      via Simulated Annealing with RMSProp gradient steps
#   3. Filter by energy thresholds → keep only good grasps
#
# SA behavior:
#   - High temperature (T=18): accepts bad moves → explores diverse configurations
#   - Low temperature (T→0): only accepts improvements → fine-tunes contact
#   - Temperature decays by 'temperature_decay' every 'annealing_period' steps
#   - Step size decays similarly for convergence
#
# ==============================================================================
optimization:

  # ── Simulated Annealing schedule ──────────────────────────────────────────
  #
  # num_iterations : total optimization steps per batch
  #                  Higher = better convergence, slower. 3000-6000 for production.
  #
  # batch_size     : number of grasp candidates optimized in parallel
  #                  Higher = more GPU usage, more grasps per run.
  #                  Limited by GPU memory. RTX 4090: 512-2048 safe.
  #
  # step_size      : initial RMSProp learning rate
  #                  Decays by temperature_decay every stepsize_period steps.
  #                  Too high → unstable, too low → slow convergence.
  #
  # starting_temperature : SA initial temperature
  #                        Higher = more exploration at start.
  #                        18.0 is DexGraspNet default.
  #
  # temperature_decay    : multiplicative decay factor (applied every annealing_period)
  #                        0.95 = 5% decay. Lower = faster cooling = less exploration.
  #
  num_iterations: 6000
  batch_size: 500
  step_size: 0.005
  starting_temperature: 18.0
  temperature_decay: 0.95

  # ── Energy weights ────────────────────────────────────────────────────────
  #
  # Total energy = E_fc + w_dis*E_dis + w_pen*E_pen + w_spen*E_spen
  #                     + w_joints*E_joints
  #
  # Matches PKU-EPIC/DexGraspNet exactly. No E_pose term.
  #
  w_dis: 100.0
  w_pen: 100.0
  w_spen: 10.0
  w_joints: 1.0

  # ── Success thresholds (filtering after optimization) ─────────────────────
  #
  # Only grasps passing ALL three thresholds are kept in the final graph.
  # Stricter thresholds = higher quality but fewer grasps.
  #
  # DexGraspNet original thresholds
  thres_fc: 0.3
  thres_dis: 0.005
  thres_pen: 0.001

# ==============================================================================
# Isaac Sim Physics-based Sampling (recommended — no FK mismatch, no penetration)
# ==============================================================================
#
# Algorithm (batched HeuristicSampler + physics settle):
#   Phase 1 — FK validation (fast, kinematics only, batched across N envs):
#     Same logic as HeuristicSampler: set joints → FK → contact + penetration check
#     Object placed at fingertip centroid of midpoint pose (no palm rotation)
#   Phase 2 — Physics settle (for FK-valid candidates):
#     Set joints → place object at Isaac FK centroid → step PhysX → check velocity
#     Filters out grasps that cause penetration ejection in simulation
#
# Advantages:
#   - Isaac Sim FK directly → no MJCF mismatch
#   - PhysX settle validation → guaranteed collision-free
#   - Same parameters as existing HeuristicSampler for consistency
#   - Joint angles in 24-DOF Isaac format directly (no conversion)
#
sim_heuristic:
  num_envs: 64                  # parallel environments for batched sampling
  noise_std: 0.3                # joint noise std (fraction of range)
  hold_steps: 40                # physics steps to hold grasp (actuators active)
  contact_threshold: 0.02       # max fingertip-to-surface distance (m)
  min_contact_fingers: 3        # minimum fingertips in contact (out of 5)
  penetration_margin: 0.008     # max finger-mesh penetration depth (m)
  nfo_min_quality: 0.0          # minimum NFO quality (0 = disabled, 0.03 = strict)
  vel_threshold: 0.3            # max object velocity after holding (m/s)
  max_rounds: 500               # maximum sampling rounds per object

# Surface-projected RRT (recommended — no penetration by construction)
surface_rrt:
  target_size: 300              # number of grasps to generate
  num_seed_grasps: 500          # seed grasps from surface sampler
  delta_pos: 0.008              # perturbation std dev (metres)
  delta_max: 0.04               # max edge distance for graph (metres)
  min_quality: 0.03             # NFO quality threshold (matches nfo section)
  max_attempts_per_step: 30     # RRT attempts per expansion step
  collision_threshold: 0.002    # max penetration depth (metres)
  min_finger_spacing: 0.01      # min pairwise fingertip distance (metres)

# RRT expansion (legacy, used when method=surface_sampling)
rrt:
  target_size: 300

# Output
output_dir: data
