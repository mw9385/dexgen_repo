# ==============================================================================
# Stage 0 – Grasp Generation Configuration
# ==============================================================================

# Object to generate grasps for
object:
  type: cube               # cube / sphere / cylinder  (ignored if mesh_path set)
  size: 0.06               # bounding box size in metres (6 cm default)
  mesh_path: null          # override with path to .obj/.stl/.ply file

# Grasp sampler
sampler:
  num_seed_grasps: 300     # initial random sample before NFO filtering
  num_candidates: 6000     # surface points sampled per attempt
  min_finger_spacing: 0.015   # metres
  max_finger_spacing: 0.12    # metres
  seed: 42

# Net Force Optimization (NFO)
nfo:
  mu: 0.5                  # friction coefficient
  num_friction_edges: 8    # linearisation edges per friction cone
  min_quality: 0.005       # minimum NFO score to keep a grasp
  fast_mode: false         # true = use SVD approx (faster, less accurate)

# RRT expansion
rrt:
  target_size: 500         # final number of grasps in GraspGraph
  delta_pos: 0.008         # max perturbation per RRT step (m)
  delta_max: 0.04          # max fingertip distance for graph edge (m)
  min_quality: 0.005       # quality threshold for expanded grasps

# Output
output_dir: data
